academic_orientation: >
  I am a sociologist based in Chile with research experience in inequality, everyday socioeconomic practices, education, interculturality, and education in carceral contexts. My work is grounded in qualitative and mixed-methods research and oriented toward the production of rigorous knowledge with social impact. I currently complement my sociological training with studies in Programming and Systems Analysis in order to strengthen my research and dissemination tools.

research_interests:
  - "Social inequality"
  - "Economic sociology"
  - "Housing and everyday life"
  - "Everyday socioeconomic practices"
  - "Economic and financial socialization"
  - "Education in carceral contexts and interculturality"
  - "Material environments and social organization"
  - "Qualitative, mixed, visual, and participatory methods"