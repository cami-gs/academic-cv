profile: >
  Sociologist based in Chile with research experience in social inequality, everyday socioeconomic practices,
  material conditions of life, interculturality, and education in institutional and carceral contexts. My work is
  grounded in qualitative and mixed-methods research, with particular interest in housing, material environments,
  social organization, and visual and participatory approaches. I am currently complementing my sociological
  training with studies in Programming and Systems Analysis in order to strengthen my research, data, and
  dissemination skills.

research_interests:
  - "Social inequality and economic sociology"
  - "Housing, material environments, and everyday life"
  - "Economic and financial socialization"
  - "Social reproduction and the sustainability of life"
  - "Interculturality and education in institutional contexts"
  - "Qualitative, mixed, visual, and participatory methods"
